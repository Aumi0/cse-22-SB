<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLASS-O-MATIC! ⚡ Live Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF6E5;
    --ink:#141414;
    --red:#EE4136;
    --blue:#1E5FD9;
    --yellow:#FFCC00;
    --pink:#FF3E9A;
    --panel-shadow: 7px 7px 0 var(--ink);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle, rgba(20,20,20,0.09) 1.6px, transparent 1.6px) 0 0/16px 16px,
      var(--paper);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    padding:24px 16px 60px;
  }
  .wrap{max-width:960px;margin:0 auto;}

  h1.title{
    font-family:'Bangers', cursive;
    font-size:clamp(2.6rem, 8vw, 4.6rem);
    letter-spacing:2px;
    text-align:center;
    color:var(--red);
    -webkit-text-stroke:2.5px var(--ink);
    margin:0 0 4px;
    transform:rotate(-2deg);
  }
  .subtitle{
    text-align:center;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:.8rem;
    margin-bottom:26px;
    color:var(--ink);
  }
  .clock{
    text-align:center;
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:1rem;
    background:var(--ink);
    color:var(--yellow);
    display:inline-block;
    padding:6px 16px;
    border-radius:20px;
    margin:0 auto 26px;
    display:block;
    width:max-content;
  }

  /* HERO PANEL */
  .hero{
    position:relative;
    background:var(--yellow);
    border:5px solid var(--ink);
    box-shadow:var(--panel-shadow);
    border-radius:14px;
    padding:30px 26px;
    margin-bottom:36px;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(circle, rgba(20,20,20,0.15) 2.2px, transparent 2.2px);
    background-size:14px 14px;
    opacity:.5;
    pointer-events:none;
  }
  .hero-inner{position:relative; text-align:center;}
  .burst{
    font-family:'Bangers',cursive;
    font-size:clamp(1.6rem,5vw,2.2rem);
    color:var(--ink);
    letter-spacing:1px;
    margin-bottom:6px;
  }
  .hero-course{
    font-family:'Bangers', cursive;
    font-size:clamp(2rem,7vw,3.4rem);
    color:var(--paper);
    -webkit-text-stroke:3px var(--ink);
    line-height:1.05;
    margin:6px 0;
  }
  .hero-meta{
    font-weight:700;
    font-size:1rem;
    margin-top:10px;
  }
  .hero-meta span{
    display:inline-block;
    background:var(--pink);
    border:3px solid var(--ink);
    border-radius:8px;
    padding:4px 10px;
    margin:4px 6px;
    color:var(--paper);
    box-shadow:3px 3px 0 var(--ink);
  }
  .hero-sub{
    display:inline-block;
    background:var(--blue);
    border:3px solid var(--ink);
    color:var(--paper);
    border-radius:8px;
    padding:4px 10px;
    margin:4px 6px;
    box-shadow:3px 3px 0 var(--ink);
  }
  .countdown{
    font-family:'Bangers',cursive;
    font-size:1.4rem;
    margin-top:14px;
    color:var(--red);
    -webkit-text-stroke:1px var(--ink);
  }

  .free{
    font-family:'Bangers',cursive;
    font-size:clamp(1.8rem,6vw,2.8rem);
    color:var(--ink);
  }

  /* WEEK GRID */
  .grid-title{
    font-family:'Bangers',cursive;
    font-size:1.6rem;
    text-align:center;
    margin-bottom:16px;
    color:var(--blue);
    -webkit-text-stroke:1.5px var(--ink);
  }
  .table-scroll{overflow-x:auto; padding-bottom:8px;}
  table{
    border-collapse:separate;
    border-spacing:6px;
    width:100%;
    min-width:760px;
  }
  th, td{
    vertical-align:top;
    padding:0;
  }
  th{
    font-family:'Archivo Black', sans-serif;
    font-size:.68rem;
    text-align:center;
    background:var(--ink);
    color:var(--paper);
    padding:8px 4px;
    border-radius:8px;
    letter-spacing:.5px;
  }
  th.dayhead{background:var(--red);}
  td.daycell{
    font-family:'Bangers',cursive;
    font-size:1.1rem;
    text-align:center;
    background:var(--blue);
    color:var(--paper);
    border-radius:8px;
    border:3px solid var(--ink);
    padding:8px 2px;
  }
  .cell{
    min-height:70px;
    border:3px solid var(--ink);
    border-radius:8px;
    background:var(--paper);
    padding:6px 7px;
    font-size:.62rem;
    line-height:1.35;
    font-weight:700;
  }
  .cell.empty{
    background:repeating-linear-gradient(45deg, rgba(20,20,20,0.05), rgba(20,20,20,0.05) 6px, transparent 6px, transparent 12px);
    color:#9a948a;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bangers',cursive;
    font-size:.9rem;
    letter-spacing:1px;
  }
  .cell .code{display:block; color:var(--red); font-family:'Archivo Black',sans-serif; font-size:.66rem; margin-bottom:2px;}
  .cell .teach{display:block;}
  .cell .room{display:block; color:var(--blue);}
  .cell.today{box-shadow:0 0 0 3px var(--yellow) inset;}
  .cell.now{
    background:var(--yellow);
    box-shadow:4px 4px 0 var(--ink);
    animation:pop 1.4s ease-in-out infinite;
    position:relative;
  }
  .cell.now::after{
    content:"NOW!";
    position:absolute; top:-11px; right:-8px;
    background:var(--red);
    color:var(--paper);
    font-family:'Bangers',cursive;
    font-size:.6rem;
    padding:2px 6px;
    border-radius:10px;
    border:2px solid var(--ink);
    transform:rotate(8deg);
  }
  @keyframes pop{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.035);}
  }
  tr.today-row td.daycell{background:var(--red);}

  footer{
    text-align:center;
    margin-top:34px;
    font-size:.65rem;
    letter-spacing:1px;
    color:#8a8378;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">CLASS-O-MATIC!</h1>
  <div class="subtitle">⚡ your live weekly routine, pow-style ⚡</div>
  <div class="clock" id="clockDisplay">--:--:--</div>

  <div class="hero" id="heroPanel">
    <div class="hero-inner" id="heroInner">
      <div class="burst">loading...</div>
    </div>
  </div>

  <div class="grid-title">THE FULL WEEK, AT A GLANCE</div>
  <div class="table-scroll">
    <table id="scheduleTable">
      <thead>
        <tr>
          <th class="dayhead">DAY</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <footer>MADE FOR YOUR TIMETABLE • STATUS UPDATES LIVE • NO REFRESH NEEDED</footer>
</div>

<script>
const SLOTS = [
  ["08:30","09:50"],
  ["09:50","11:10"],
  ["11:10","12:30"],
  ["12:30","13:50"],
  ["13:50","15:10"],
  ["15:10","16:30"]
];

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday"];

const SCHEDULE = {
  Sunday: [
    {code:"CSE 0613-1104", teacher:"Md. Mohidul Alam", room:"306 / L1"},
    {code:"CSE 0223-1113", teacher:"MEH", room:"501"},
    null,
    {code:"CSE 0541-1107", teacher:"Manik Hossain", room:"303"},
    null,
    {code:"CSE 0613-1109", teacher:"EK", room:"305"}
  ],
  Monday: [
    {code:"CSE 0611-1102", teacher:"MAA", room:"425 / L1"},
    {code:"CSE 0533-1105", teacher:"MMR", room:"216-Ad"},
    {code:"CSE 0613-1103", teacher:"MMA", room:"304"},
    null, null, null
  ],
  Tuesday: [null,null,null,null,null,null],
  Wednesday: [
    null,
    {code:"CSE 0613-1109", teacher:"EK", room:"303"},
    {code:"CSE 0223-1113", teacher:"MEH", room:"501"},
    null, null,
    {code:"CSE 0232-1111", teacher:"INY", room:"305"}
  ],
  Thursday: [
    {code:"CSE 0541-1107", teacher:"MMH", room:"303"},
    {code:"CSE 0613-1103", teacher:"MMA", room:"305"},
    {code:"CSE 0533-1105", teacher:"MMR", room:"216-Ad"},
    null,
    {code:"CSE 0533-1106", teacher:"AS/MMR", room:"218-Ad"},
    null
  ]
};

function buildTable(){
  const thead = document.querySelector('#scheduleTable thead tr');
  SLOTS.forEach(([s,e])=>{
    const th = document.createElement('th');
    th.textContent = s+"–"+e;
    thead.appendChild(th);
  });

  const tbody = document.getElementById('tableBody');
  DAYS.forEach(day=>{
    const tr = document.createElement('tr');
    tr.dataset.day = day;
    const dcell = document.createElement('td');
    dcell.className = 'daycell';
    dcell.textContent = day.slice(0,3).toUpperCase();
    tr.appendChild(dcell);
    SLOTS.forEach((slot, i)=>{
      const td = document.createElement('td');
      const entry = SCHEDULE[day][i];
      const div = document.createElement('div');
      if(entry){
        div.className = 'cell';
        div.innerHTML = `<span class="code">${entry.code}</span><span class="teach">${entry.teacher}</span><span class="room">${entry.room}</span>`;
      } else {
        div.className = 'cell empty';
        div.textContent = 'FREE';
      }
      div.dataset.day = day;
      div.dataset.slot = i;
      td.appendChild(div);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function toMinutes(t){
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function pad(n){return n.toString().padStart(2,'0');}

function update(){
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const dayName = DAYS[now.getDay()] || null;
  const nowMin = now.getHours()*60 + now.getMinutes();

  // clear previous highlights
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.remove('now');
    c.classList.remove('today');
  });
  document.querySelectorAll('tr').forEach(r=>r.classList.remove('today-row'));

  let currentEntry = null, currentSlotIdx = -1;
  let nextEntry = null, nextSlot = null, nextDayLabel = null;

  if(dayName && SCHEDULE[dayName]){
    const row = document.querySelector(`tr[data-day="${dayName}"]`);
    if(row) row.classList.add('today-row');

    SLOTS.forEach(([s,e], i)=>{
      const cell = document.querySelector(`.cell[data-day="${dayName}"][data-slot="${i}"]`);
      if(cell) cell.classList.add('today');
      const startMin = toMinutes(s), endMin = toMinutes(e);
      if(SCHEDULE[dayName][i] && nowMin>=startMin && nowMin<endMin){
        currentEntry = SCHEDULE[dayName][i];
        currentSlotIdx = i;
        if(cell) cell.classList.add('now');
      }
    });

    if(!currentEntry){
      for(let i=0;i<SLOTS.length;i++){
        const startMin = toMinutes(SLOTS[i][0]);
        if(SCHEDULE[dayName][i] && nowMin < startMin){
          nextEntry = SCHEDULE[dayName][i];
          nextSlot = SLOTS[i];
          nextDayLabel = "today";
          break;
        }
      }
    }
  }

  // if no next class found today, search following days
  if(!currentEntry && !nextEntry){
    for(let offset=1; offset<=7; offset++){
      const idx = (now.getDay()+offset) % 7;
      const label = DAYS[idx];
      if(label && SCHEDULE[label]){
        for(let i=0;i<SLOTS.length;i++){
          if(SCHEDULE[label][i]){
            nextEntry = SCHEDULE[label][i];
            nextSlot = SLOTS[i];
            nextDayLabel = label;
            break;
          }
        }
      }
      if(nextEntry) break;
    }
  }

  const hero = document.getElementById('heroInner');
  if(currentEntry){
    const [,endTime] = SLOTS[currentSlotIdx];
    hero.innerHTML = `
      <div class="burst">🥊 HAPPENING RIGHT NOW 🥊</div>
      <div class="hero-course">${currentEntry.code}</div>
      <div class="hero-meta">
        <span>👤 ${currentEntry.teacher}</span>
        <span class="hero-sub">📍 ${currentEntry.room}</span>
      </div>
      <div class="countdown">WRAPS UP AT ${endTime}</div>
    `;
  } else if(nextEntry){
    hero.innerHTML = `
      <div class="burst">${nextDayLabel==='today' ? "⏳ UP NEXT TODAY" : "⏳ UP NEXT ("+nextDayLabel.toUpperCase()+")"}</div>
      <div class="hero-course">${nextEntry.code}</div>
      <div class="hero-meta">
        <span>👤 ${nextEntry.teacher}</span>
        <span class="hero-sub">📍 ${nextEntry.room}</span>
      </div>
      <div class="countdown">STARTS AT ${nextSlot[0]}</div>
    `;
  } else {
    hero.innerHTML = `<div class="free">😎 NOTHING SCHEDULED — ENJOY IT!</div>`;
  }
}

buildTable();
update();
setInterval(update, 1000);
</script>
</body>
</html>
