
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE 22 SECTION B! ⚡ Live Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF6E5;
    --ink:#141414;
    --red:#EE4136;
    --blue:#1E5FD9;
    --yellow:#FFCC00;
    --pink:#FF3E9A;
    --panel-shadow: 7px 7px 0 var(--ink);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle, rgba(20,20,20,0.09) 1.6px, transparent 1.6px) 0 0/16px 16px,
      var(--paper);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    padding:24px 16px 60px;
  }
  .wrap{max-width:820px;margin:0 auto;}

  h1.title{
    font-family:'Bangers', cursive;
    font-size:clamp(2.6rem, 8vw, 4.6rem);
    letter-spacing:2px;
    text-align:center;
    color:var(--red);
    -webkit-text-stroke:2.5px var(--ink);
    margin:0 0 4px;
    transform:rotate(-2deg);
  }
  .subtitle{
    text-align:center;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:.75rem;
    margin-bottom:20px;
    color:var(--ink);
  }
  .clock{
    text-align:center;
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:1rem;
    background:var(--ink);
    color:var(--yellow);
    padding:6px 16px;
    border-radius:20px;
    margin:0 auto 26px;
    display:block;
    width:max-content;
  }

  .hero{
    position:relative;
    background:var(--yellow);
    border:5px solid var(--ink);
    box-shadow:var(--panel-shadow);
    border-radius:14px;
    padding:30px 26px;
    margin-bottom:38px;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(circle, rgba(20,20,20,0.15) 2.2px, transparent 2.2px);
    background-size:14px 14px;
    opacity:.5;
    pointer-events:none;
  }
  .hero-inner{position:relative; text-align:center;}
  .burst{
    font-family:'Bangers',cursive;
    font-size:clamp(1.4rem,5vw,2rem);
    color:var(--ink);
    letter-spacing:1px;
    margin-bottom:6px;
  }
  .hero-title{
    font-family:'Archivo Black', sans-serif;
    font-size:clamp(1rem,3.4vw,1.3rem);
    color:var(--ink);
    margin:4px 0 2px;
  }
  .hero-course{
    font-family:'Bangers', cursive;
    font-size:clamp(1.8rem,6.5vw,3rem);
    color:var(--paper);
    -webkit-text-stroke:3px var(--ink);
    line-height:1.05;
    margin:2px 0 8px;
  }
  .hero-meta span{
    display:inline-block;
    background:var(--pink);
    border:3px solid var(--ink);
    border-radius:8px;
    padding:4px 10px;
    margin:4px 6px;
    color:var(--paper);
    box-shadow:3px 3px 0 var(--ink);
    font-size:.78rem;
  }
  .hero-meta span.room{ background:var(--blue); }
  .countdown{
    font-family:'Bangers',cursive;
    font-size:1.3rem;
    margin-top:14px;
    color:var(--red);
    -webkit-text-stroke:1px var(--ink);
  }
  .free{
    font-family:'Bangers',cursive;
    font-size:clamp(1.6rem,6vw,2.4rem);
    color:var(--ink);
  }

  .grid-title{
    font-family:'Bangers',cursive;
    font-size:1.5rem;
    text-align:center;
    margin-bottom:18px;
    color:var(--blue);
    -webkit-text-stroke:1.5px var(--ink);
  }

  .day-block{ margin-bottom:26px; }
  .day-label{
    display:inline-block;
    font-family:'Bangers',cursive;
    font-size:1.15rem;
    letter-spacing:1px;
    background:var(--ink);
    color:var(--paper);
    padding:4px 16px;
    border-radius:8px 8px 0 0;
    transform:rotate(-1deg);
  }
  .day-label.today{ background:var(--red); }
  .day-body{
    border:4px solid var(--ink);
    border-radius:0 12px 12px 12px;
    background:var(--paper);
    padding:10px;
    box-shadow:5px 5px 0 var(--ink);
  }
  .day-body.no-classes{
    font-family:'Bangers',cursive;
    font-size:1rem;
    text-align:center;
    padding:16px;
    color:#9a948a;
  }

  .class-row{
    display:flex;
    gap:12px;
    align-items:flex-start;
    border:3px solid var(--ink);
    border-radius:8px;
    padding:8px 10px;
    margin-bottom:8px;
    background:#fff;
  }
  .class-row:last-child{margin-bottom:0;}
  .class-row.now{
    background:var(--yellow);
    box-shadow:4px 4px 0 var(--ink);
    animation:pop 1.4s ease-in-out infinite;
  }
  @keyframes pop{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.015);}
  }
  .time-chip{
    font-family:'Archivo Black',sans-serif;
    font-size:.62rem;
    background:var(--blue);
    color:var(--paper);
    border-radius:6px;
    padding:4px 6px;
    white-space:nowrap;
    min-width:78px;
    text-align:center;
    align-self:center;
  }
  .class-row.now .time-chip{ background:var(--red); }
  .class-info{flex:1; font-size:.72rem; line-height:1.4;}
  .class-info .code{
    font-family:'Archivo Black',sans-serif;
    color:var(--red);
    font-size:.7rem;
    margin-right:6px;
  }
  .class-info .name{font-weight:700;}
  .class-info .teacher{ color:var(--ink); }
  .class-info .room{ color:var(--blue); font-weight:700; }
  .now-badge{
    font-family:'Bangers',cursive;
    font-size:.6rem;
    background:var(--red);
    color:var(--paper);
    padding:2px 6px;
    border-radius:10px;
    border:2px solid var(--ink);
    align-self:center;
    transform:rotate(6deg);
  }

  footer{
    text-align:center;
    margin-top:34px;
    font-size:.62rem;
    letter-spacing:1px;
    color:#8a8378;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">CSE 22 SECTION B !</h1>
  <div class="subtitle">⚡ your live weekly routine, ⚡</div>
  <div class="clock" id="clockDisplay">--:--:--</div>

  <div class="hero" id="heroPanel">
    <div class="hero-inner" id="heroInner">
      <div class="burst">loading...</div>
    </div>
  </div>

  <div class="grid-title">THE FULL WEEK, AT A GLANCE</div>
  <div id="daysContainer"></div>

  <footer>MADE FOR YOUR TIMETABLE • STATUS UPDATES LIVE • NO REFRESH NEEDED /hr vibecoded by human</footer>
</div>

<script>
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday"];

const SCHEDULE = {
  Sunday: [
    {start:"08:30", end:"11:10", code:"CSE 0613-1104", title:"Structure Programming Language Lab", teacher:"Md. Mohidul Alam (Lab 1) / NT-1 (Lab 2)", room:"306"},
    {start:"11:10", end:"12:30", code:"CSE 0223-1113", title:"Introduction to Ethics", teacher:"Md. Enamul Haque", room:"501"},
    {start:"12:30", end:"13:50", code:"CSE 0541-1107", title:"Differential and Integral Calculus", teacher:"Md. Manik Hussain", room:"303"},
    {start:"15:10", end:"16:30", code:"CSE 0613-1109", title:"Discrete Mathematics", teacher:"Esrath Kanon", room:"305"}
  ],
  Monday: [
    {start:"08:30", end:"11:10", code:"CSE 0611-1102", title:"Computer Applications Lab", teacher:"Mst. Anika Amzad", room:"425"},
    {start:"11:10", end:"12:30", code:"CSE 0613-1103", title:"Structure Programming Language", teacher:"Md. Mohidul Alam", room:"304"},
    {start:"12:30", end:"13:50", code:"CSE 0533-1105", title:"Physics", teacher:"Md. Matiur Rahman", room:"216-Ad"}
  ],
  Tuesday: [],
  Wednesday: [
    {start:"09:50", end:"11:10", code:"CSE 0613-1109", title:"Discrete Mathematics", teacher:"Esrath Kanon", room:"303"},
    {start:"11:10", end:"12:30", code:"CSE 0223-1113", title:"Introduction to Ethics", teacher:"Md. Enamul Haque", room:"501"},
    {start:"15:10", end:"16:30", code:"CSE 0232-1111", title:"Communicative English", teacher:"M. M. Iftekhairun Nisa", room:"305"}
  ],
  Thursday: [
    {start:"08:30", end:"09:50", code:"CSE 0541-1107", title:"Differential and Integral Calculus", teacher:"Md. Manik Hussain", room:"303"},
    {start:"09:50", end:"11:10", code:"CSE 0613-1103", title:"Structure Programming Language", teacher:"Md. Mohidul Alam", room:"305"},
    {start:"11:10", end:"12:30", code:"CSE 0533-1105", title:"Physics", teacher:"Md. Matiur Rahman", room:"216-Ad"},
    {start:"13:50", end:"15:10", code:"CSE 0533-1106", title:"Physics Lab", teacher:"Abdullah Saikat / Md. Matiur Rahman", room:"218-Ad"}
  ]
};

function toMinutes(t){
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function pad(n){return n.toString().padStart(2,'0');}
function fmt(t){
  const [h,m] = t.split(':').map(Number);
  const hour12 = ((h+11)%12)+1;
  const ampm = h<12 ? "AM" : "PM";
  return `${hour12}:${pad(m)} ${ampm}`;
}

function buildDays(){
  const container = document.getElementById('daysContainer');
  DAYS.forEach(day=>{
    const block = document.createElement('div');
    block.className = 'day-block';
    block.dataset.day = day;

    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = day.toUpperCase();
    block.appendChild(label);

    const body = document.createElement('div');
    const entries = SCHEDULE[day];
    if(!entries || entries.length===0){
      body.className = 'day-body no-classes';
      body.textContent = '😎 NO CLASSES — FREE DAY';
    } else {
      body.className = 'day-body';
      entries.forEach((e, idx)=>{
        const row = document.createElement('div');
        row.className = 'class-row';
        row.dataset.day = day;
        row.dataset.idx = idx;
        row.innerHTML = `
          <div class="time-chip">${fmt(e.start)}<br>–<br>${fmt(e.end)}</div>
          <div class="class-info">
            <div><span class="code">${e.code}</span><span class="name">${e.title}</span></div>
            <div class="teacher">👤 ${e.teacher}</div>
            <div class="room">📍 Room ${e.room}</div>
          </div>
        `;
        body.appendChild(row);
      });
    }
    block.appendChild(body);
    container.appendChild(block);
  });
}

function update(){
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const dayName = DAYS[now.getDay()] || null;
  const nowMin = now.getHours()*60 + now.getMinutes();

  document.querySelectorAll('.class-row').forEach(r=>{
    r.classList.remove('now');
    const badge = r.querySelector('.now-badge');
    if(badge) badge.remove();
  });
  document.querySelectorAll('.day-label').forEach(l=>l.classList.remove('today'));

  const todayLabel = document.querySelector(`.day-block[data-day="${dayName}"] .day-label`);
  if(todayLabel) todayLabel.classList.add('today');

  let currentEntry=null;
  let nextEntry=null, nextDayLabel=null;

  if(dayName && SCHEDULE[dayName]){
    SCHEDULE[dayName].forEach((e, idx)=>{
      const startMin = toMinutes(e.start), endMin = toMinutes(e.end);
      if(nowMin>=startMin && nowMin<endMin){
        currentEntry = e;
        const row = document.querySelector(`.class-row[data-day="${dayName}"][data-idx="${idx}"]`);
        if(row){
          row.classList.add('now');
          const badge = document.createElement('div');
          badge.className = 'now-badge';
          badge.textContent = 'NOW!';
          row.appendChild(badge);
        }
      }
    });
    if(!currentEntry){
      for(const e of SCHEDULE[dayName]){
        if(toMinutes(e.start) > nowMin){ nextEntry = e; nextDayLabel = "today"; break; }
      }
    }
  }

  if(!currentEntry && !nextEntry){
    for(let offset=1; offset<=7; offset++){
      const idx = (now.getDay()+offset) % 7;
      const label = DAYS[idx];
      if(label && SCHEDULE[label] && SCHEDULE[label].length>0){
        nextEntry = SCHEDULE[label][0];
        nextDayLabel = label;
        break;
      }
    }
  }

  const hero = document.getElementById('heroInner');
  if(currentEntry){
    hero.innerHTML = `
      <div class="burst">🥊 HAPPENING RIGHT NOW 🥊</div>
      <div class="hero-course">${currentEntry.code}</div>
      <div class="hero-title">${currentEntry.title}</div>
      <div class="hero-meta">
        <span>👤 ${currentEntry.teacher}</span>
        <span class="room">📍 Room ${currentEntry.room}</span>
      </div>
      <div class="countdown">WRAPS UP AT ${fmt(currentEntry.end)}</div>
    `;
  } else if(nextEntry){
    hero.innerHTML = `
      <div class="burst">${nextDayLabel==='today' ? "⏳ UP NEXT TODAY" : "⏳ UP NEXT ("+nextDayLabel.toUpperCase()+")"}</div>
      <div class="hero-course">${nextEntry.code}</div>
      <div class="hero-title">${nextEntry.title}</div>
      <div class="hero-meta">
        <span>👤 ${nextEntry.teacher}</span>
        <span class="room">📍 Room ${nextEntry.room}</span>
      </div>
      <div class="countdown">STARTS AT ${fmt(nextEntry.start)}</div>
    `;
  } else {
    hero.innerHTML = `<div class="free">😎 NOTHING SCHEDULED — ENJOY IT!</div>`;
  }
}

buildDays();
update();
setInterval(update, 1000);
</script>
</body>
</html>
